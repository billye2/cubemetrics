name: CI

# Runs the ship gate (unit tests + production build) on every PR to master and
# on pushes to master. The `verify` job is the required status check for the
# master branch protection rule — see docs/agent-orchestration.md.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    env:
      # Build is force-dynamic everywhere — these are dummy placeholders so any
      # module-level env read can't crash the build. No real secrets needed.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: https://cubemetrics.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
